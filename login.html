<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - MRDU Lost & Found</title>
    <style>
        /* 1. The Perfect Animated Background */
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            font-family: 'Arial', sans-serif;
            
            /* Remove the image and add the animated gradient */
            background: linear-gradient(-45deg, #1e3c72, #2a5298, #0e1c26, #0072ff);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* This makes the gradient slowly move */
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 2. The Dark Glass Box */
        .glass-login-box {
            background: rgba(0, 0, 0, 0.85); /* Dark transparent black */
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            width: 90%;
            max-width: 400px;
            text-align: center;
            color: white; /* Forces all text inside to be white */
        }

        /* 3. Headers and text inside the box */
        .glass-login-box h2 {
            margin: 0 0 5px 0;
            font-size: 26px;
        }
        .glass-login-box p {
            margin: 0 0 20px 0;
            color: #ccc;
        }

        /* 4. Inputs */
        .input-group {
            text-align: left;
            margin-bottom: 15px;
        }
        .input-group label {
            display: block;
            font-size: 13px;
            margin-bottom: 5px;
            color: #ddd;
        }
        .input-group input, .input-group select {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #555;
            background: rgba(255,255,255,0.1);
            color: white;
            box-sizing: border-box;
            font-size: 15px;
        }
        
        /* 5. Buttons & Links */
        .glow-btn {
            width: 100%;
            padding: 12px;
            background: #0072ff;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
        }
        .glow-btn:hover {
            background: #00c6ff;
            transform: translateY(-2px);
        }
        
        .register-link {
            margin-top: 20px;
            font-size: 14px;
        }
        .register-link a {
            color: #00c6ff;
            text-decoration: none;
            font-weight: bold;
        }
        .register-link a:hover {
            text-decoration: underline;
            color: white;
        }
    </style>
</head>
<body>

    <div class="glass-login-box">
        <h2>🎓 MRDU Campus</h2>
        <p>Lost & Found Portal</p>

        <div class="input-group">
            <label>Username</label>
            <input type="text" id="username" placeholder="Enter student ID" required>
        </div>
        
        <div class="input-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="••••••••" required>
        </div>

        <div class="input-group">
            <label>Login As</label>
            <select id="role">
                <option value="student">Student</option>
                <option value="admin">Admin</option>
            </select>
        </div>

        <button class="glow-btn" onclick="login()">Login</button>
        
        <div class="register-link">
            Don't have an account? <a href="#" onclick="register()">Register</a>
        </div>

        <p id="error-message" style="margin-top: 15px; font-size: 14px; font-weight: bold;"></p>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <script src="rtrp1.js"></script>

</body>
</html>
